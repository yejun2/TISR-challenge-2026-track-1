# general settings
name: sr_x8_thermal_multiscale_supervision_depth_anything
model_type: DRCTModel
scale: 8
num_gpu: auto
manual_seed: 0

# dataset and data loader settings
datasets:
  train:
    name: thermal
    type: ThermalPairedDataset
    dataroot_gt: /SSD4/vipnu/PBVS_TSR/datasets/track1/thermal/train/GT_final
    dataroot_lq: /SSD4/vipnu/PBVS_TSR/datasets/track1/thermal/train/LR_x8_final
#    meta_info_file: drct/data/meta_info/meta_info_DF2Ksub_GT.txt
    io_backend:
      type: disk

    gt_size: 384
    use_hflip: true
    use_rot: true

    masking:
      enable: true
      p: 0.25           # 적용 확률
      min_size: 2       # 블록 최소 크기
      max_size: 6      # 블록 최대 크기
      max_blocks: 4     # 한 이미지에 넣을 블록 개수(랜덤 1~max_blocks)
      fill: mean        # mean 또는 zero

    # data loader
    use_shuffle: true
    num_worker_per_gpu: 4
    batch_size_per_gpu: 4
    dataset_enlarge_ratio: 1
    prefetch_mode: ~

  val_1:
    name: thermal
    type: ThermalPairedDataset
    dataroot_gt: /SSD4/vipnu/PBVS_TSR/datasets/track1/thermal/val/GT_final
    dataroot_lq: /SSD4/vipnu/PBVS_TSR/datasets/track1/thermal/val/LR_x8_final
    io_backend:
      type: disk

#  val_2:
#    name: Set14
#    type: PairedImageDataset
#    dataroot_gt: ./datasets/Set14/GTmod4
#    dataroot_lq: ./datasets/Set14/LRbicx4
#    io_backend:
#      type: disk

  # val_3:
  #   name: Urban100
  #   type: PairedImageDataset
  #   dataroot_gt: ./datasets/urban100/GTmod4
  #   dataroot_lq: ./datasets/urban100/LRbicx4
  #   io_backend:
  #     type: disk


# network structures
network_g:
  type: DRCT
  upscale: 8
  in_chans: 3
  img_size: 48
  window_size: 16
  compress_ratio: 3
  squeeze_factor: 30
  conv_scale: 0.01
  overlap_ratio: 0.5
  img_range: 1.
  depths: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  embed_dim: 180
  num_heads: [6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6, 6]
  mlp_ratio: 2
  upsampler: 'pixelshuffle'
  resi_connection: '1conv'

# path
path:
  pretrain_network_g: /SSD4/vipnu/drct/DRCT/experiments/x8_df2k_fintune/models/net_g_125000.pth
  # pretrain_network_g: /SSD4/vipnu/PBVS_TSR/experiments/pretrained_models/pretrained_model.pth
  param_key_g: 'params_ema'
  strict_load_g: false
  resume_state: ~

# training settings
train:
  ema_decay: 0.999
  optim_g:
    type: Adam
    lr: !!float 5e-5
    weight_decay: 0
    betas: [0.9, 0.99]

  scheduler:
    type: CosineAnnealingRestartLR
    periods: [50000, 60000, 70000, 75000]
    restart_weights: [1, 0.5, 0.5, 0.5]
    eta_min: !!float 1e-7

  total_iter: 50000
  warmup_iter: -1

  da3_opt:
    enable: true
    model_name: depth-anything/DA3-LARGE-1.1
    cache_root: datasets/da3_cache/thermal_train_gt_down   # crop_pos 없으면 자동으로 저장 안 함(안전)
    w_rad: 0.02
    warmup_iter: 300
    warmup_scale: 0.2
    normalize: true
    clip_min: 0.02
    clip_max: 0.98
    eps_inv_depth: 1.0e-6
    log_interval: 200
    loss:
      type: SSIMStructureOnlyLoss

  pixel_opt:
    type: MultiLoss
    loss_weight: 1.0
    reduction: mean

# validation settings
val:
  val_freq: !!float 1e2
  save_img: false
  pbar: False

  metrics:
    psnr:
      type: calculate_psnr
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher
    ssim:
      type: calculate_ssim
      crop_border: 4
      test_y_channel: true
      better: higher  # the higher, the better. Default: higher

# logging settings
logger:
  print_freq: 100
  save_checkpoint_freq: !!float 1e2
  use_tb_logger: true
  wandb:
    project: ~
    resume_id: ~

# dist training settings
dist_params:
  backend: nccl
  port: 50333
